<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Editor | CodeBase Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
        }

        .admin-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            transition: all 0.3s ease;
            animation: scaleIn 0.5s ease backwards;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .module-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .module-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .btn-danger {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .resource-list {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .resource-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 20px;
            border-radius: 10px;
        }

        .type-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--accent-primary);
            text-transform: uppercase;
            margin-right: 8px;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <a href="admin.html" class="back-btn">← Back to Dashboard</a>
                <h1 id="courseTitle">Loading Course...</h1>
                <p id="courseIdDisplay" style="color: var(--text-muted); margin-top: 8px;"></p>
            </div>
        </header>

        <!-- New Module Form -->
        <div class="admin-card">
            <div class="section-header">
                <h2>Add New Module</h2>
            </div>
            <form id="moduleForm" class="grid-form">
                <div class="form-group"><label>Title (e.g. 01 - Intro)</label><input type="text" id="moduleTitle"
                        required></div>
                <div class="form-group"><label>Description</label><input type="text" id="moduleDesc"></div>
                <div class="form-group" style="justify-content: flex-end;"><button type="submit" class="action-btn">Add
                        Module</button></div>
            </form>
        </div>

        <div id="moduleList">
            <!-- Dynamic Modules -->
        </div>
    </div>

    <!-- Edit Module Modal -->
    <div id="editModModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">Edit Module</h2>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Title</label>
                <input type="text" id="editModTitle">
            </div>
            <div class="form-group" style="margin-bottom:25px;">
                <label>Description</label>
                <input type="text" id="editModDesc">
            </div>
            <div style="display:flex; justify-content:flex-end; gap:12px;">
                <button class="action-btn secondary" onclick="closeEditModModal()">Cancel</button>
                <button class="action-btn" id="saveModBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Edit Resource Modal -->
    <div id="editResModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">Edit Resource</h2>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Title</label>
                <input type="text" id="editResTitle">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>URL</label>
                <input type="url" id="editResLink">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Course</label>
                <select id="editResCourse" onchange="loadEditResModules(this.value)"
                    style="width:100%; padding:8px; border-radius:4px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.2); color:white;">
                </select>
            </div>
            <div class="form-group" style="margin-bottom:25px;">
                <label>Module</label>
                <select id="editResModule"
                    style="width:100%; padding:8px; border-radius:4px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.2); color:white;">
                </select>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:12px;">
                <button class="action-btn secondary" onclick="closeEditResModal()">Cancel</button>
                <button class="action-btn" id="saveResBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, setDoc, deleteDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
        import { app } from "./assets/js/firebase.js";

        const db = getFirestore(app);
        const auth = getAuth(app);
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get("id");

        if (!courseId) window.location.href = "admin.html";

        let currentPerms = {};

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const snap = await getDoc(doc(db, "users", user.uid));
            if (!snap.exists() || !["owner", "admin", "editor"].includes(snap.data().role)) {
                window.location.href = "access-denied.html"; return;
            }

            const userData = snap.data();

            if (userData.role !== "owner") {
                const roleSnap = await getDoc(doc(db, "roles", userData.customRoleId || "none"));
                if (roleSnap.exists()) {
                    currentPerms = roleSnap.data().permissions || {};
                } else {
                    window.location.href = "access-denied.html"; return;
                }

                const courseYear = courseId[2];
                const yearMatch = (currentPerms.allowedYears || []).includes(courseYear);
                const courseMatch = (currentPerms.allowedCourses || []).includes(courseId);

                if (!yearMatch && !courseMatch || !currentPerms.canManageCourses) {
                    window.location.href = "access-denied.html"; return;
                }
            } else {
                currentPerms = { isOwner: true };
            }

            loadCourseInfo();
            loadModules();
        });

        async function loadCourseInfo() {
            const snap = await getDoc(doc(db, "courses", courseId));
            if (snap.exists()) {
                document.getElementById("courseTitle").textContent = snap.data().name;
                document.getElementById("courseIdDisplay").textContent = `ID: ${courseId}`;
            }
        }

        let allModules = [];

        async function loadModules() {
            const snap = await getDocs(collection(db, "courses", courseId, "content"));
            const host = document.getElementById("moduleList");
            host.innerHTML = "";
            allCurrentResources = []; // Reset global resource cache on each full load

            allModules = [];
            snap.forEach(d => allModules.push({ id: d.id, ...d.data() }));

            // Sort modules by title numeric prefix
            allModules.sort((a, b) => parseInt(a.tittle) - parseInt(b.tittle));

            for (const m of allModules) {
                const div = document.createElement("div");
                div.className = "module-item";
                div.style.animationDelay = `${i * 0.05}s`;
                div.innerHTML = `
          <div class="module-header">
            <div>
              <h3 style="display: flex; align-items: center;">
                ${m.tittle}
              </h3>
              <p style="color: var(--text-muted); font-size: 0.9rem;">${m.description || ''}</p>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="action-btn secondary" style="padding:6px 12px; font-size:0.75rem;" onclick="openEditModule('${m.id}')">Edit Module</button>
                <button class="btn-danger" onclick="deleteModule('${m.id}')">Delete Module</button>
            </div>
          </div>
          
          <div class="resource-list" id="res-${m.id}">
            <p style="font-size: 0.8rem; color: var(--text-muted);">Loading resources...</p>
          </div>

          <form onsubmit="addResource(event, '${m.id}')" class="grid-form" style="margin-top:20px; border-top: 1px solid var(--glass-border); padding-top:20px;">
            <div class="form-group"><label>Resource Title</label><input type="text" id="resTitle-${m.id}" required></div>
            <div class="form-group"><label>Type</label>
                <select id="resType-${m.id}">
                    <option value="link">Link</option>
                    <option value="pdf">PDF (Drive Link)</option>
                    <option value="video">YouTube Video</option>
                </select>
            </div>
            <div class="form-group"><label>URL</label><input type="url" id="resLink-${m.id}" required></div>
            <div class="form-group"><label>Creator Registration No</label><input type="text" id="resOwnerReg-${m.id}" placeholder="e.g. 2022/ICT/62" required></div>
            <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 10px;">
                <input type="checkbox" id="resOriginal-${m.id}" style="width: 20px; height: 20px;">
                <label style="margin: 0;">Original Creation</label>
            </div>
            <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 0px;">
                <input type="checkbox" id="resPinned-${m.id}" style="width: 20px; height: 20px;">
                <label style="margin: 0;">Pin Resource</label>
            </div>
            <div class="form-group" style="justify-content: flex-end;"><button type="submit" class="action-btn secondary">Add Resource</button></div>
          </form>
        `;
                host.appendChild(div);
                await loadResources(m.id);
            }
        }

        let allCurrentResources = []; // Store currently loaded resources to populate the modal

        async function loadResources(moduleId) {
            const snap = await getDocs(collection(db, "courses", courseId, "content", moduleId, "resources"));
            const host = document.getElementById(`res-${moduleId}`);
            host.innerHTML = "";

            const resources = [];
            snap.forEach(d => {
                const resData = { id: d.id, ...d.data() };
                resources.push(resData);
                const existIdx = allCurrentResources.findIndex(x => x.id === d.id);
                if (existIdx >= 0) allCurrentResources[existIdx] = resData;
                else allCurrentResources.push(resData);
            });
            resources.sort((a, b) => (a.title || '').localeCompare(b.title || ''));



            if (resources.length === 0) {
                host.innerHTML = '<p style="font-size: 0.8rem; color: var(--text-muted);">No resources yet.</p>';
                return;
            }

            resources.forEach(r => {
                const item = document.createElement("div");
                item.className = "resource-item";
                item.innerHTML = `
          <div>
            <span class="type-badge">${r.type}</span>
            ${r.isPinned ? '<span class="type-badge" style="background:#f59e0b; color:white;">📌 Pinned</span>' : ''}
            <span style="font-weight:600;">${r.title}</span>
            <a href="${r.link}" target="_blank" style="color:var(--accent-primary); margin-left:10px; font-size:0.8rem;">View</a>
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            <button class="action-btn secondary" style="padding:6px 12px; font-size:0.75rem;" onclick="openEditResource('${moduleId}', '${r.id}')">Edit</button>
            <button class="action-btn secondary" style="padding:6px 12px; font-size:0.75rem;" onclick="togglePin('${moduleId}', '${r.id}', ${r.isPinned || false})">
                ${r.isPinned ? 'Unpin' : 'Pin'}
            </button>
            <button class="btn-danger" onclick="deleteResource('${moduleId}', '${r.id}')">Remove</button>
          </div>
        `;
                host.appendChild(item);
            });
        }

        document.getElementById("moduleForm").onsubmit = async (e) => {
            e.preventDefault();
            if (!currentPerms.isOwner && !currentPerms.canManageCourses) {
                alert("Permission denied."); return;
            }
            const title = document.getElementById("moduleTitle").value;
            const desc = document.getElementById("moduleDesc").value;

            await addDoc(collection(db, "courses", courseId, "content"), {
                tittle: title,
                description: desc
            });

            e.target.reset();
            loadModules();
        };

        window.addResource = async (e, moduleId) => {
            e.preventDefault();
            if (!currentPerms.isOwner && !currentPerms.canManageCourses) {
                alert("Permission denied."); return;
            }

            const currentUser = auth.currentUser;
            const userSnap = await getDoc(doc(db, "users", currentUser.uid));
            const userName = userSnap.exists() ? userSnap.data().name : currentUser.displayName || "Unknown Admin";

            const title = document.getElementById(`resTitle-${moduleId}`).value;
            const type = document.getElementById(`resType-${moduleId}`).value;
            const link = document.getElementById(`resLink-${moduleId}`).value;
            const ownerReg = document.getElementById(`resOwnerReg-${moduleId}`).value;
            const isOriginal = document.getElementById(`resOriginal-${moduleId}`).checked;
            const isPinned = document.getElementById(`resPinned-${moduleId}`).checked;

            await addDoc(collection(db, "courses", courseId, "content", moduleId, "resources"), {
                title: title,
                type: type,
                link: link,
                ownerReg: ownerReg,
                isOriginal: isOriginal,
                isPinned: isPinned,
                uploadedBy: userSnap.data().registrationNumber || userName,
                uploadedAt: new Date().toISOString()
            });

            e.target.reset();
            loadResources(moduleId);
        };

        window.deleteModule = async (moduleId) => {
            if (!currentPerms.isOwner && !currentPerms.canManageDelete) {
                alert("Destructive action denied."); return;
            }
            if (confirm("Delete this module and all its resources?")) {
                // Resources should be deleted too, but Firestore doesn't delete subcollections automatically.
                // For simplicity in this admin tool, we'll just delete the module doc.
                await deleteDoc(doc(db, "courses", courseId, "content", moduleId));
                loadModules();
            }
        };

        window.deleteResource = async (moduleId, resId) => {
            if (!currentPerms.isOwner && !currentPerms.canManageDelete) {
                alert("Destructive action denied."); return;
            }
            if (confirm("Remove this resource?")) {
                await deleteDoc(doc(db, "courses", courseId, "content", moduleId, "resources", resId));
                loadResources(moduleId);
            }
        };

        window.togglePin = async (moduleId, resId, currentStatus) => {
            if (!currentPerms.isOwner && !currentPerms.canManageCourses) {
                alert("Permission denied."); return;
            }
            await updateDoc(doc(db, "courses", courseId, "content", moduleId, "resources", resId), {
                isPinned: !currentStatus
            });
            loadResources(moduleId);
        };

        let activeEditResModuleId = null;
        let activeEditResId = null;

        window.openEditResource = async (moduleId, resId) => {
            const r = allCurrentResources.find(x => x.id === resId);
            if (!r) return;
            activeEditResModuleId = moduleId;
            activeEditResId = resId;
            document.getElementById("editResTitle").value = r.title || "";
            document.getElementById("editResLink").value = r.link || "";

            const courseSelect = document.getElementById("editResCourse");
            const modSelect = document.getElementById("editResModule");
            courseSelect.innerHTML = "";
            modSelect.innerHTML = "";

            const snap = await getDocs(collection(db, "courses"));
            snap.forEach(d => {
                if (!currentPerms.isOwner) {
                    const courseYear = d.id[2];
                    const yearMatch = (currentPerms.allowedYears || []).includes(courseYear);
                    const courseMatch = (currentPerms.allowedCourses || []).includes(d.id);
                    if (!yearMatch && !courseMatch) return;
                }
                courseSelect.innerHTML += `<option value="${d.id}">${d.data().name} (${d.id})</option>`;
            });
            courseSelect.value = courseId; // default to current course

            await window.loadEditResModules(courseId);
            modSelect.value = moduleId;

            document.getElementById("editResModal").classList.add("active");
        };

        window.loadEditResModules = async (selectedCourseId) => {
            const moduleSelect = document.getElementById("editResModule");
            moduleSelect.innerHTML = '<option value="">-- Choose Module --</option>';
            if (!selectedCourseId) return;

            const snap = await getDocs(collection(db, "courses", selectedCourseId, "content"));
            const mods = [];
            snap.forEach(d => mods.push({ id: d.id, ...d.data() }));
            mods.sort((a, b) => parseInt(a.tittle) - parseInt(b.tittle));
            mods.forEach(m => {
                moduleSelect.innerHTML += `<option value="${m.id}">${m.tittle}</option>`;
            });
        };

        window.closeEditResModal = () => {
            document.getElementById("editResModal").classList.remove("active");
            activeEditResModuleId = null;
            activeEditResId = null;
        };

        document.getElementById("saveResBtn").onclick = async () => {
            if (!activeEditResId || !activeEditResModuleId) return;
            if (!currentPerms.isOwner && !currentPerms.canManageCourses) {
                alert("Permission denied."); return;
            }

            const newTitle = document.getElementById("editResTitle").value;
            const newLink = document.getElementById("editResLink").value;
            const newCourseId = document.getElementById("editResCourse").value;
            const newModId = document.getElementById("editResModule").value;

            const btn = document.getElementById("saveResBtn");
            btn.disabled = true;
            btn.textContent = "Saving...";

            try {
                if (newCourseId !== courseId || newModId !== activeEditResModuleId) {
                    // Move to new course/module
                    const oldRef = doc(db, "courses", courseId, "content", activeEditResModuleId, "resources", activeEditResId);
                    const newRef = doc(db, "courses", newCourseId, "content", newModId, "resources", activeEditResId);

                    const snap = await getDoc(oldRef);
                    if (snap.exists()) {
                        const data = snap.data();
                        data.title = newTitle;
                        data.link = newLink;
                        await setDoc(newRef, data);
                        await deleteDoc(oldRef);
                    }
                } else {
                    // Just update
                    await updateDoc(doc(db, "courses", courseId, "content", activeEditResModuleId, "resources", activeEditResId), {
                        title: newTitle,
                        link: newLink
                    });
                }
                closeEditResModal();
                await loadModules();
            } catch (err) {
                alert("Failed to update: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Save Changes";
            }
        };

        let activeEditModId = null;

        window.openEditModule = (id) => {
            const m = allModules.find(x => x.id === id);
            if (!m) return;
            activeEditModId = id;
            document.getElementById("editModTitle").value = m.tittle || "";
            document.getElementById("editModDesc").value = m.description || "";
            document.getElementById("editModModal").classList.add("active");
        };

        window.closeEditModModal = () => {
            document.getElementById("editModModal").classList.remove("active");
            activeEditModId = null;
        };

        document.getElementById("saveModBtn").onclick = async () => {
            if (!activeEditModId) return;
            if (!currentPerms.isOwner && !currentPerms.canManageCourses) {
                alert("Permission denied."); return;
            }

            const newTitle = document.getElementById("editModTitle").value;
            const newDesc = document.getElementById("editModDesc").value;

            const btn = document.getElementById("saveModBtn");
            btn.disabled = true;
            btn.textContent = "Saving...";

            try {
                await updateDoc(doc(db, "courses", courseId, "content", activeEditModId), {
                    tittle: newTitle, // uses 'tittle' for backward compatibility
                    description: newDesc
                });
                closeEditModModal();
                loadModules();
            } catch (err) {
                alert("Failed to update: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Save Changes";
            }
        };

    </script>
</body>

</html>
