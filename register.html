<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CodeBase</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0f172a;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-primary: #6366f1;
      --accent-secondary: #ec4899;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
      background-size: 200% 200%;
      animation: bg-shift 15s ease infinite alternate;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      overflow: hidden;
    }

    @keyframes bg-shift {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 100% 50%;
      }
    }

    .bg-graphics {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      mix-blend-mode: screen;
      animation: float 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-primary), transparent 70%);
      top: -10%;
      left: -10%;
      animation-duration: 25s;
    }

    .blob-2 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-secondary), transparent 70%);
      bottom: -15%;
      right: -10%;
      animation-duration: 30s;
      animation-delay: -5s;
    }

    .blob-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #0ea5e9, transparent 70%);
      top: 40%;
      left: 30%;
      animation-duration: 22s;
      animation-delay: -10s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }

      33% {
        transform: translate(30px, -50px) scale(1.1) rotate(10deg);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.9) rotate(-10deg);
      }

      100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
    }

    .card {
      width: 95%;
      max-width: 440px;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 95vh;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .card::-webkit-scrollbar {
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    h2 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.04em;
      animation: scaleIn 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
      font-weight: 400;
      animation: fadeIn 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    .email-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 0.875rem;
      border: 1px solid var(--glass-border);
      color: var(--accent-primary);
      font-weight: 700;
      animation: fadeIn 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
      width: 100%;
      animation: fadeIn 0.8s backwards;
    }

    .input-group:nth-child(4) { animation-delay: 0.55s; }
    .input-group:nth-child(5) { animation-delay: 0.62s; }
    .input-group-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
      animation: fadeIn 0.8s 0.69s backwards;
    }
    .input-group:nth-child(7) { animation-delay: 0.76s; }

    .input-group input,
    #level,
    #semester {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      border: 1px solid var(--glass-border);
      outline: none;
      border-radius: 16px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-main);
      appearance: none;
      -webkit-appearance: none;
    }

    .input-group input:focus,
    #level:focus,
    #semester:focus {
      border-color: var(--accent-primary);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
    }

    .label {
      position: absolute;
      top: 16px;
      left: 16px;
      color: var(--text-muted);
      pointer-events: none;
      font-size: 0.95rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: -12px;
      left: 12px;
      font-size: 0.75rem;
      color: var(--accent-primary);
      background: transparent;
      padding: 0 4px;
      border-radius: 4px;
      font-weight: 600;
    }

    .sLabel {
      top: -12px;
      left: 12px;
      font-size: 0.75rem;
      color: var(--accent-primary);
      position: absolute;
      background: transparent;
      padding: 0 4px;
      border-radius: 4px;
      z-index: 5;
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 18px;
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent-primary), #4f46e5);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
      animation: fadeIn 0.8s 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.4);
      filter: brightness(1.1);
    }

    button:active {
      transform: translateY(0);
    }

    .val-message {
      font-size: 0.75rem;
      text-align: left;
      margin-top: -15px;
      margin-bottom: 15px;
      padding-left: 12px;
      transition: all 0.3s;
      font-weight: 500;
    }

    .val-message.error { color: #f87171; }
    .val-message.success { color: #34d399; }

    .loading-spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 440px) {
      .card {
        padding: 32px 20px;
        border-radius: 24px;
      }
      h2 { font-size: 1.8rem; }
    }
  </style>
</head>

<body>
  <div class="bg-graphics">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="card">
    <h2>Register</h2>
    <p class="subtitle">Complete your student profile to access all features. Verify your details below.</p>

    <!-- USER EMAIL DISPLAY -->
    <div id="emailCard" class="email-card"></div>

    <!-- FULL NAME -->
    <div class="input-group">
      <input type="text" id="name" placeholder=" " readonly>
      <label for="name" class="label">Full Name</label>
    </div>

    <!-- REGISTRATION NUMBER -->
    <div class="input-group">
      <input type="text" id="regno" maxlength="15" placeholder=" " required>
      <label for="regno" class="label">Registration Number</label>
    </div>

    <!-- Academic Info (Year + Semester) -->
    <div class="input-group-grid">
      <div class="input-group" style="margin-bottom: 0;">
        <label class="sLabel">Academic Year</label>
        <select id="level" required>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
      </div>
      <div class="input-group" style="margin-bottom: 0;">
        <label class="sLabel">Semester</label>
        <select id="semester" required>
          <option value="1">Semester 1</option>
          <option value="2">Semester 2</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <input type="text" id="phone" placeholder=" ">
      <label for="phone" class="label">Phone Number</label>
    </div>
    <div id="phoneVal" class="val-message"></div>

    <button id="submitBtn" onclick="submitRegistration()">
      <span id="btnText">Complete Registration</span>
      <div id="btnSpinner" class="loading-spinner"></div>
    </button>
  </div>

  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
    import { app } from "./assets/js/firebase.js";

    const auth = getAuth(app);
    const db = getFirestore(app);

    const submitBtn = document.getElementById("submitBtn");
    const btnText = document.getElementById("btnText");
    const btnSpinner = document.getElementById("btnSpinner");
    const phoneInput = document.getElementById("phone");
    const phoneVal = document.getElementById("phoneVal");
    const regnoInput = document.getElementById("regno");

    let currentStream = "";

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      // CHECK IF ALREADY REGISTERED
      const userSnap = await getDoc(doc(db, "users", user.uid));
      if (userSnap.exists()) {
        alert("You are already registered! Redirecting to your dashboard...");
        window.location.href = "dashboard.html";
        return;
      }

      // Initial Setup
      document.getElementById("emailCard").textContent = user.email;
      document.getElementById("name").value = user.displayName || "";

      // Autofill RegNo
      const emailPrefix = user.email.split("@")[0];
      const allowedUserDetails = JSON.parse(localStorage.getItem("allowedUserDetails"));
      
      let autoReg;
      if (allowedUserDetails && allowedUserDetails.regNo) {
        autoReg = allowedUserDetails.regNo;
      } else {
        autoReg = formatRegNo(emailPrefix);
      }
      regnoInput.value = autoReg;
    });

    function formatRegNo(raw) {
      raw = raw.toUpperCase().replace(/[^A-Z0-9]/g, "");
      if (raw.length < 4) return raw;

      const year = raw.substring(0, 4);
      let dept = "";
      let num = "";

      for (let i = 4; i < raw.length; i++) {
        if (/[0-9]/.test(raw[i])) {
          dept = raw.substring(4, i);
          num = raw.substring(i);
          break;
        }
      }

      if (dept === "") dept = raw.substring(4);
      currentStream = dept; 

      let result = year;
      if (dept) result += "/" + dept;
      if (num) result += "/" + num;

      return result;
    }

    regnoInput.addEventListener("input", function () {
      this.value = formatRegNo(this.value);
    });

    function validatePhone(phone) {
      return /^07[0-9]{8}$/.test(phone);
    }

    phoneInput.addEventListener("input", function () {
      const val = this.value.trim();
      if (val === "") {
        phoneVal.textContent = "";
      } else if (validatePhone(val)) {
        phoneVal.textContent = "✓ Valid phone number";
        phoneVal.className = "val-message success";
        this.style.borderColor = "#10b981";
      } else {
        phoneVal.textContent = "✗ Must be 07XXXXXXXX format";
        phoneVal.className = "val-message error";
        this.style.borderColor = "#ef4444";
      }
    });

    window.submitRegistration = function() {
      const reg = regnoInput.value.trim();
      const phone = phoneInput.value.trim();
      const level = document.getElementById("level").value.trim();
      const semester = document.getElementById("semester").value.trim();

      if (!validatePhone(phone)) {
        phoneVal.textContent = "Please enter a valid phone number";
        phoneVal.className = "val-message error";
        phoneInput.focus();
        return;
      }

      btnText.style.display = "none";
      btnSpinner.style.display = "block";
      submitBtn.disabled = true;

      formatRegNo(reg.replace(/\//g, "")); 

      window.registerUser(reg, phone, level, semester, currentStream);
    };
  </script>
</body>

</html>
