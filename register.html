<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CodeBase</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0f172a;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-primary: #6366f1;
      --accent-secondary: #ec4899;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--text-main);
      overflow: hidden;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      padding: 48px 32px;
      border-radius: 32px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.04em;
    }

    p {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-weight: 500;
    }

    .email-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 0.875rem;
      border: 1px solid var(--glass-border);
      color: var(--accent-primary);
      font-weight: 700;
      animation: fadeInUp 0.5s 0.2s backwards;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
      width: 100%;
      animation: fadeInUp 0.5s backwards;
    }

    .input-group:nth-child(4) {
      animation-delay: 0.3s;
    }

    .input-group:nth-child(5) {
      animation-delay: 0.35s;
    }

    .input-group:nth-child(6) {
      animation-delay: 0.4s;
    }

    .input-group:nth-child(7) {
      animation-delay: 0.45s;
    }

    .input-group input,
    #level {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border: 1px solid var(--glass-border);
      outline: none;
      border-radius: 12px;
      transition: all 0.3s ease;
      background: rgba(0, 0, 0, 0.2);
      color: white;
    }

    .input-group input:focus,
    #level:focus {
      border-color: var(--accent-primary);
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
    }

    .label {
      position: absolute;
      top: 14px;
      left: 16px;
      color: var(--text-muted);
      pointer-events: none;
      font-size: 0.9375rem;
      transition: 0.3s ease;
      background: transparent;
    }

    .input-group input:focus+label,
    .input-group input:not(:placeholder-shown)+label {
      top: -10px;
      left: 12px;
      font-size: 0.75rem;
      color: var(--accent-primary);
      background: #1e293b;
      padding: 0 4px;
      border-radius: 4px;
    }

    .sLabel {
      top: -10px;
      left: 12px;
      font-size: 0.75rem;
      color: var(--accent-primary);
      position: absolute;
      background: #1e293b;
      padding: 0 4px;
      border-radius: 4px;
      z-index: 5;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: var(--accent-primary);
      color: white;
      font-weight: 800;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      animation: fadeInUp 0.5s 0.6s backwards;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
      background: #4f46e5;
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Register</h2>
    <p>Verify your details</p>

    <!-- USER EMAIL DISPLAY -->
    <div id="emailCard" class="email-card"></div>

    <!-- FULL NAME -->
    <div class="input-group">
      <input type="text" id="name" placeholder=" " readonly>
      <label for="name" class="label">Full Name</label>
    </div>

    <!-- REGISTRATION NUMBER -->
    <div class="input-group">
      <input type="text" id="regno" maxlength="15" placeholder=" " required>
      <label for="regno" class="label">Registration Number</label>
    </div>

    <!-- Year -->
    <div class="input-group">
      <label class="sLabel">Academic Year</label>
      <select id="level" required>
        <option value="1">1st Year</option>
        <option value="2">2nd Year</option>
        <option value="3">3rd Year</option>
        <option value="4">4th Year</option>
      </select>
    </div>

    <!-- PHONE -->
    <div class="input-group">
      <input type="text" id="phone" placeholder=" ">
      <label for="phone" class="label">Phone Number</label>
    </div>

    <button onclick="submitRegistration()">
      Complete Registration
    </button>
  </div>

  <script type="module" src="assets/js/firebase.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));

    if (!user) {
      window.location.href = "index.html";
    }

    // Set email + name
    document.getElementById("emailCard").textContent = user.email;
    document.getElementById("name").value = user.name;

    // Extract registration number from email BEFORE the '@'
    const emailPrefix = user.email.split("@")[0];

    // Convert to formatted REG NO → 2022/ICT/62
    function formatRegNo(raw) {
      raw = raw.toUpperCase().replace(/[^A-Z0-9]/g, "");
      const year = raw.substring(0, 4);
      let dept = "";
      let num = "";

      for (let i = 4; i < raw.length; i++) {
        if (/[0-9]/.test(raw[i])) {
          dept = raw.substring(4, i);
          num = raw.substring(i);
          break;
        }
      }

      if (dept === "") dept = raw.substring(4);

      let result = year;
      if (dept) result += "/" + dept;
      if (num) result += "/" + num;

      return result;
    }

    const allowedUserDetails = JSON.parse(localStorage.getItem("allowedUserDetails"));
    let autoReg;

    if (allowedUserDetails && allowedUserDetails.regNo) {
      autoReg = allowedUserDetails.regNo;
    } else {
      autoReg = formatRegNo(emailPrefix);
    }

    document.getElementById("regno").value = autoReg;

    document.getElementById("regno").addEventListener("input", function () {
      this.value = formatRegNo(this.value);
    });

    function validatePhone(phone) {
      return /^07[0-9]{8}$/.test(phone);
    }

    function submitRegistration() {
      const reg = document.getElementById("regno").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const level = document.getElementById("level").value.trim();

      if (!validatePhone(phone)) {
        alert("Invalid phone number. Use Sri Lankan format: 07XXXXXXXX");
        return;
      }

      registerUser(reg, phone, level);
    }
  </script>
</body>

</html>
