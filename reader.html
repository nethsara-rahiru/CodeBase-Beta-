<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Reader</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0f172a;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-primary: #6366f1;
      --accent-secondary: #ec4899;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    header {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
      font-weight: 600;
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateX(-2px);
    }

    .download-btn {
      padding: 8px 16px;
      background: var(--accent-primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .download-btn:hover {
      background: #4f46e5;
      transform: translateY(-1px);
    }

    h1 {
      font-size: 1rem;
      font-weight: 700;
      opacity: 0.8;
    }

    /* Viewer Area */
    #viewerContainer {
      flex: 1;
      position: relative;
      background: #1e293b;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Watermark */
    #watermark {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 140px;
      opacity: 0.5;
      filter: grayscale(1) invert(1);
      pointer-events: none;
      z-index: 50;
      transition: opacity 0.3s;
    }

    #viewerContainer:hover #watermark {
      opacity: 0.2;
    }

    @media (max-width: 640px) {
      header {
        padding: 12px 16px;
      }

      h1 {
        font-size: 0.875rem;
        display: block;
        /* maintain title visibility */
      }

      .back-btn,
      .download-btn {
        padding: 6px 12px;
        font-size: 0.75rem;
        border-radius: 10px;
      }

      #watermark {
        width: 80px;
        bottom: 16px;
        right: 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="nav-actions">
      <button class="back-btn" onclick="history.back()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back
      </button>
      <h1>Document Reader</h1>
    </div>
    <button class="download-btn" onclick="downloadPDF()">Download PDF</button>
  </header>

  <div id="viewerContainer">
    <iframe id="pdfFrame" src="" allowfullscreen></iframe>
    <img id="watermark" src="assets/img/CodeBase_wide.png" alt="CodeBase">
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fileId = params.get("id");

    if (!fileId) {
      alert("PDF ID missing!");
      throw new Error("No PDF ID");
    }

    // Load PDF into viewer
    const previewURL = `https://drive.google.com/file/d/${fileId}/preview`;
    document.getElementById("pdfFrame").src = previewURL;

    // Direct download (Google Drive allowed)
    function downloadPDF() {
      const link = document.createElement("a");
      link.href = `https://drive.google.com/u/0/uc?id=${fileId}&export=download`;
      link.download = "document.pdf";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>

</body>

</html>
