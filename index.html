<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CodeBase — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .brand-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.04em;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 0.9375rem;
            font-weight: 500;
            line-height: 1.5;
        }

        .google-btn {
            width: 100%;
            background: white;
            color: #1e293b;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            background: #f8fafc;
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .footer {
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            opacity: 0.6;
        }

        #loading {
            margin-top: 24px;
            display: none;
            font-size: 0.875rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        @media (max-width: 400px) {
            .card {
                padding: 32px 20px;
                border-radius: 24px;
            }

            .brand-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1 class="brand-title">CodeBase</h1>
        <p class="subtitle">Personalized learning hub for university students. Login to continue.</p>

        <button id="googleBtn" class="google-btn" onclick="handleGoogleLogin()">
            <img src="assets/img/gLogo.png" alt="Google">
            Continue with Google
        </button>

        <div id="loading">Establishing secure connection...</div>

        <p class="footer">Made with ❤️ by students — for students</p>
    </div>

    <script>
        async function handleGoogleLogin() {
            const btn = document.getElementById("googleBtn");
            const loading = document.getElementById("loading");

            btn.disabled = true;
            btn.style.opacity = "0.7";
            loading.style.display = "block";

            try {
                await window.googleLogin();
            } catch (error) {
                console.error("Login error:", error);
                alert("Authentication failed: " + (error.message || "Please check your connection."));
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
                loading.style.display = "none";
            }
        }
    </script>

    <script type="module" src="assets/js/firebase.js"></script>

</body>

</html>
