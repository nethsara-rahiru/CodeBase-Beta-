<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CodeBase — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <meta name="description"
        content="CodeBase - A secure learning management platform for university students. Access course materials, organizations, and community resources safely.">
    <meta name="keywords" content="University, Education, LMS, Student Hub, UWU, Vau">
    <meta name="author" content="CodeBase Learning Team">
    <meta property="og:title" content="CodeBase | University Learning Hub">
    <meta property="og:description"
        content="Personalized educational dashboard for university students. Login securely with student email.">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            background-size: 200% 200%;
            animation: bg-shift 15s ease infinite alternate;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        @keyframes bg-shift {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .brand-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.04em;
            animation: scaleIn 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .footer {
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            opacity: 0.6;
            animation: fadeIn 1s 1s backwards;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 400;
            animation: fadeIn 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .google-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 24px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeIn 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: var(--glass-border);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        #loading {
            margin-top: 24px;
            display: none;
            font-size: 0.875rem;
            color: var(--accent-primary);
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 32px 20px;
                border-radius: 24px;
            }

            .brand-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1 class="brand-title">CodeBase</h1>
        <p class="subtitle">Personalized learning hub for university students. Login to continue.</p>

        <button id="googleBtn" class="google-btn" onclick="handleGoogleLogin()">
            <img src="assets/img/gLogo.png" alt="Google">
            Continue with Google
        </button>

        <div id="loading">Establishing secure connection...</div>

        <p class="footer">
            Designed for University Students — Non-commercial Project<br>
            <a href="privacy.html"
                style="color: var(--accent-primary); text-decoration: none; margin-top: 5px; display: inline-block;">Privacy
                Policy</a> — <a href="about.html" style="color: var(--accent-primary); text-decoration: none;">About
                Team</a>
        </p>
    </div>

    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { app } from "./assets/js/firebase.js";

        const auth = getAuth(app);
        const btn = document.getElementById("googleBtn");
        const loading = document.getElementById("loading");

        // FAST REDIRECT IF SESSION EXISTS
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loading.style.display = "block";
                loading.textContent = "Welcome back! Redirecting...";
                window.location.href = "dashboard.html";
            }
        });

        window.handleGoogleLogin = async function () {
            btn.disabled = true;
            btn.style.opacity = "0.7";
            loading.style.display = "block";
            loading.textContent = "Establishing secure connection...";

            try {
                // calls window.googleLogin defined in firebase.js
                await window.googleLogin();
            } catch (error) {
                console.error("Login error:", error);
                alert("Authentication failed: " + (error.message || "Please check your connection."));
                btn.disabled = false;
                btn.style.opacity = "1";
                loading.style.display = "none";
            }
        };
    </script>

    <script type="module" src="assets/js/firebase.js"></script>

</body>

</html>
