<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Editor | CodeBase</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-secondary: #ec4899;
            --accent-warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(-2px);
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .main-container {
            flex: 1;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .editor-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .title-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .title-input:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            position: sticky;
            top: 80px;
            z-index: 50;
        }

        .tool-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-border);
        }

        .tool-btn.active {
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .lang-selector {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .lang-btn {
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .content-area {
            min-height: 400px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 24px;
            color: white;
            line-height: 1.6;
            font-size: 1.1rem;
            outline: none;
            cursor: text;
        }

        .content-area:focus {
            border-color: var(--glass-border);
            background: rgba(255, 255, 255, 0.04);
        }

        .content-area [data-placeholder]:empty:before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            cursor: text;
        }

        .content-area img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 16px 0;
            display: block;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
        }

        .primary-btn {
            padding: 12px 32px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .primary-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .primary-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Bar for Buttons */
        .btn-loading {
            position: relative;
            overflow: hidden !important;
        }

        .btn-loading .loading-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            width: 0%;
            transition: width 0.3s;
        }

        .btn-loading.processing .loading-bar {
            width: 100%;
            animation: loadingProgress 2s infinite linear;
        }

        @keyframes loadingProgress {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        .secondary-btn {
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .tts-btn {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .tts-btn:hover {
            background: rgba(245, 158, 11, 0.2);
        }

        /* Modal for images */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 40px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.05);
        }

        /* Language specific fonts if needed */
        .lang-sinhala { font-family: 'Iskoola Pota', 'Plus Jakarta Sans', sans-serif; }
        .lang-tamil { font-family: 'Latha', 'Plus Jakarta Sans', sans-serif; }

        @media (max-width: 640px) {
            header { padding: 12px 20px; }
            .main-container { padding: 20px; }
            .editor-card { padding: 20px; }
            .toolbar { top: 60px; }
        }
    </style>
</head>

<body>
    <header>
        <div class="brand-area">
            <a href="resources.html" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Resources
            </a>
            <h1 id="pageTitle">Create Blog</h1>
        </div>
        <div id="readAloudArea" style="display:none;">
            <button class="secondary-btn tts-btn" id="ttsBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                <span>Read Aloud</span>
                <div class="loading-bar"></div>
            </button>
        </div>
    </header>

    <main class="main-container">
        <div class="editor-card">
            <div class="form-group">
                <label>Blog Title</label>
                <input type="text" id="blogTitle" class="title-input" placeholder="Enter an eye-catching title...">
            </div>

            <div class="toolbar" id="editorToolbar">
                <button class="tool-btn" data-command="bold" title="Bold"><b>B</b></button>
                <button class="tool-btn" data-command="italic" title="Italic"><i>I</i></button>
                <button class="tool-btn" data-command="underline" title="Underline"><u>U</u></button>
                <div style="width:1px; background:var(--glass-border); margin:0 4px;"></div>
                <button class="tool-btn" data-command="justifyLeft" title="Align Left">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>
                </button>
                <button class="tool-btn" data-command="justifyCenter" title="Align Center">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="10" x2="6" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="18" y1="18" x2="6" y2="18"></line></svg>
                </button>
                <button class="tool-btn" data-command="justifyRight" title="Align Right">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="7" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="7" y2="18"></line></svg>
                </button>
                <div style="width:1px; background:var(--glass-border); margin:0 4px;"></div>
                <button class="tool-btn" data-command="insertUnorderedList" title="Bullet List">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </button>
                <button class="tool-btn" id="insertImage" title="Insert Image">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                </button>

                <div class="lang-selector">
                    <button class="lang-btn active" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="si">SI</button>
                    <button class="lang-btn" data-lang="ta">TA</button>
                </div>
            </div>

            <div class="form-group">
                <label>Blog Content</label>
                <div id="editorContent" class="content-area" contenteditable="true" data-placeholder="Start writing your story here..."></div>
            </div>

            <div class="actions">
                <button class="secondary-btn" id="saveDraftBtn" style="display:none;">Save Draft</button>
                <button class="primary-btn" id="publishBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    <span>Publish Blog</span>
                    <div class="loading-bar"></div>
                </button>
            </div>
        </div>
    </main>

    <!-- Image Upload Modal -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <h3>Insert Image</h3>
            <p style="color:var(--text-muted); font-size:0.85rem; margin-top:8px;">Choose an image to upload to your blog</p>
            <div class="upload-area" id="dropZone">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:12px; opacity:0.5;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <p>Click or drag to upload</p>
                <input type="file" id="imageInput" accept="image/*" style="display:none;">
            </div>
            <div style="display:flex; gap:12px;">
                <button class="secondary-btn" style="flex:1;" onclick="closeImageModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-storage.js";
        import { app, auth, db, storage } from "./assets/js/firebase.js";

        const editorContent = document.getElementById("editorContent");
        const blogTitle = document.getElementById("blogTitle");
        const publishBtn = document.getElementById("publishBtn");
        const pageTitle = document.getElementById("pageTitle");
        const ttsBtn = document.getElementById("ttsBtn");
        const readAloudArea = document.getElementById("readAloudArea");

        let currentUser = null;
        let userData = null;
        let currentBlogId = new URLSearchParams(window.location.search).get("id");
        let currentCourseId = localStorage.getItem("selectedCourseId");
        let currentModuleId = localStorage.getItem("selectedContentId");
        let isEditMode = !!currentBlogId;

        // Language Handling
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                const lang = btn.dataset.lang;
                editorContent.classList.remove("lang-sinhala", "lang-tamil");
                if (lang === "si") editorContent.classList.add("lang-sinhala");
                if (lang === "ta") editorContent.classList.add("lang-tamil");
            };
        });

        // Toolbar Commands
        document.querySelectorAll(".tool-btn[data-command]").forEach(btn => {
            btn.onclick = (e) => {
                e.preventDefault();
                const command = btn.dataset.command;
                document.execCommand(command, false, null);
                btn.classList.toggle("active", document.queryCommandState(command));
            };
        });

        // Cloudinary Configuration
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dbnvewztc/image/upload";
        const UPLOAD_PRESET = "CodeBase";

        // Image Insertion
        const imageModal = document.getElementById("imageModal");
        const imageInput = document.getElementById("imageInput");
        const dropZone = document.getElementById("dropZone");

        document.getElementById("insertImage").onclick = () => imageModal.classList.add("active");
        window.closeImageModal = () => imageModal.classList.remove("active");

        dropZone.onclick = () => imageInput.click();

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) uploadImage(file);
        };

        // Drag & Drop for Editor
        editorContent.addEventListener("dragover", (e) => {
            e.preventDefault();
            editorContent.style.borderColor = "var(--accent-primary)";
            editorContent.style.background = "rgba(255, 255, 255, 0.05)";
        });

        editorContent.addEventListener("dragleave", () => {
            editorContent.style.borderColor = "var(--glass-border)";
            editorContent.style.background = "none";
        });

        editorContent.addEventListener("drop", async (e) => {
            e.preventDefault();
            editorContent.style.borderColor = "var(--glass-border)";
            editorContent.style.background = "none";

            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith("image/")) {
                // Set cursor position at drop point
                if (document.caretRangeFromPoint) {
                    const range = document.caretRangeFromPoint(e.clientX, e.clientY);
                    const selection = window.getSelection();
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
                
                uploadImage(file);
            }
        });

        async function uploadImage(file) {
            const originalBtnText = dropZone.innerHTML;
            dropZone.innerHTML = "<p>Uploading...</p>";
            
            try {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", UPLOAD_PRESET);

                const response = await fetch(CLOUDINARY_URL, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Cloudinary upload failed");
                
                const data = await response.json();
                const url = data.secure_url;
                
                // Insert into editor at current selection (or drop point)
                editorContent.focus();
                const img = `<img src="${url}" alt="Blog Image" style="max-width:100%; border-radius:12px; margin: 12px 0;">`;
                document.execCommand("insertHTML", false, img);
                
                imageModal.classList.remove("active");
            } catch (err) {
                alert("Upload failed: " + err.message);
            } finally {
                dropZone.innerHTML = originalBtnText;
            }
        }

        // Auth & Initial Load
        onAuthStateChanged(auth, async user => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            currentUser = user;
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
                userData = userSnap.data();
            }

            if (isEditMode) {
                loadBlogData();
            } else {
                // If create mode, but user is guest (somehow), check
                if (!userData) {
                     window.location.href = "index.html";
                }
            }
        });

        async function loadBlogData() {
            try {
                const blogSnap = await getDoc(doc(db, "community_resources", currentBlogId));
                if (blogSnap.exists()) {
                    const data = blogSnap.data();
                    
                    // Permission Check
                    const isAdmin = userData?.role === 'admin' || userData?.role === 'owner';
                    const isOwner = data.uploadedByUid === currentUser.uid;
                    
                    if (!isAdmin && !isOwner) {
                        // READ MODE
                        pageTitle.textContent = "View Blog";
                        document.getElementById("editorToolbar").style.display = "none";
                        publishBtn.style.display = "none";
                        editorContent.contentEditable = "false";
                        blogTitle.readOnly = true;
                        blogTitle.style.border = "none";
                        blogTitle.style.background = "none";
                        blogTitle.style.padding = "0";
                    } else {
                        pageTitle.textContent = "Edit Blog";
                        publishBtn.innerHTML = `
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                            Update Blog
                        `;
                    }

                    blogTitle.value = data.title;
                    editorContent.innerHTML = data.content;
                    
                    // Show TTS
                    readAloudArea.style.display = "block";
                }
            } catch (err) {
                console.error("Error loading blog:", err);
            }
        }

        // Final Robust TTS System (No-Referrer Iframe Hack + Neural)
        let ttsAudio = new Audio();
        let ttsQueue = [];
        let ttsIndex = 0;
        let availableVoices = [];

        // Hidden iframe with no-referrer policy (Bypasses Google's 404 anti-hotlinking)
        const ttsFrame = document.createElement('iframe');
        ttsFrame.style.display = 'none';
        ttsFrame.setAttribute('referrerpolicy', 'no-referrer');
        document.body.appendChild(ttsFrame);

        const loadVoices = () => {
            availableVoices = window.speechSynthesis.getVoices();
        };
        window.speechSynthesis.onvoiceschanged = loadVoices;
        setInterval(loadVoices, 500);

        ttsBtn.onclick = () => {
            const text = editorContent.innerText.replace(/[\n\r]+/g, ' ').trim();
            if (!text) return;

            speechSynthesis.cancel();
            ttsAudio.pause();
            ttsAudio.src = "";
            
            ttsQueue = [];
            ttsIndex = 0;

            // Detect languages & split text
            let currentLang = 'en';
            let currentText = '';
            for (let char of text) {
                const code = char.charCodeAt(0);
                let charLang = 'en';
                if (code >= 0x0D80 && code <= 0x0DFF) charLang = 'si';
                else if (code >= 0x0B80 && code <= 0x0BFF) charLang = 'ta';
                else if (/[\s\d\W]/.test(char)) charLang = currentLang;

                if (charLang !== currentLang && currentText.trim()) {
                    ttsQueue.push({ text: currentText.trim(), lang: currentLang === 'en' ? 'en-US' : (currentLang === 'si' ? 'si-LK' : 'ta-IN') });
                    currentText = '';
                    currentLang = charLang;
                } else if (charLang !== currentLang && !currentText.trim()) {
                    currentLang = charLang;
                }
                currentText += char;
            }
            if (currentText.trim()) ttsQueue.push({ text: currentText.trim(), lang: currentLang === 'en' ? 'en-US' : (currentLang === 'si' ? 'si-LK' : 'ta-IN') });

            const final = [];
            ttsQueue.forEach(item => {
                const chunks = item.text.match(/.{1,150}(\s|$)/g) || [item.text];
                chunks.forEach(c => final.push({ text: c.trim(), lang: item.lang }));
            });
            ttsQueue = final.filter(q => q.text.length > 0);

            if (ttsQueue.length > 0) {
                ttsBtn.classList.add("processing", "btn-loading");
                ttsBtn.querySelector("span").textContent = "Preparing...";
                speakNextChunk();
            }
        };

        function speakNextChunk() {
            if (ttsIndex >= ttsQueue.length) {
                ttsBtn.classList.remove("processing", "btn-loading");
                ttsBtn.querySelector("span").textContent = "Read Aloud";
                return;
            }

            const item = ttsQueue[ttsIndex];
            const langPrefix = item.lang.split('-')[0];
            ttsBtn.querySelector("span").textContent = `Reading (${langPrefix})...`;

            loadVoices(); 
            const voice = availableVoices.find(v => v.lang.startsWith(langPrefix) && (v.name.includes("Online") || v.name.includes("Natural") || v.localService === false)) ||
                          availableVoices.find(v => v.lang.startsWith(langPrefix)) ||
                          availableVoices.find(v => v.name.toLowerCase().includes(langPrefix === 'si' ? 'sinhala' : 'tamil'));

            if (voice) {
                const utterance = new SpeechSynthesisUtterance(item.text);
                utterance.voice = voice;
                utterance.lang = item.lang;
                utterance.rate = 1.0;
                
                utterance.onend = () => {
                    ttsIndex++;
                    speakNextChunk();
                };
                utterance.onerror = () => playGoogleFallback(item);
                speechSynthesis.speak(utterance);
            } else {
                playGoogleFallback(item);
            }
        }

        function playGoogleFallback(item) {
            const tl = item.lang.split('-')[0];
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(item.text)}&tl=${tl}&client=tw-ob`;
            
            // By setting src on a no-referrer iframe, we mimic the "direct browse" link behavior you found
            ttsFrame.src = url;
            const charDelay = 85; 
            setTimeout(() => {
                ttsIndex++;
                speakNextChunk();
            }, item.text.length * charDelay + 1000);
        }

        // Publish Logic
        publishBtn.onclick = async () => {
            const title = blogTitle.value.trim();
            const content = editorContent.innerHTML.trim();

            if (!title || !content || content === "<br>") {
                alert("Please provide both title and content.");
                return;
            }

            publishBtn.disabled = true;
            publishBtn.classList.add("processing", "btn-loading");
            publishBtn.querySelector("span").textContent = isEditMode ? "Updating..." : "Publishing...";

            try {
                const blogData = {
                    title: title,
                    type: "blog",
                    content: content,
                    ownerReg: userData.registrationNumber,
                    uploadedBy: userData.name,
                    uploadedByUid: currentUser.uid,
                    updatedAt: serverTimestamp(),
                    courseId: currentCourseId,
                    moduleId: currentModuleId,
                    link: "" // For compatibility with resource list
                };

                if (isEditMode) {
                    await updateDoc(doc(db, "community_resources", currentBlogId), blogData);
                    alert("Blog updated successfully!");
                } else {
                    blogData.uploadedAt = serverTimestamp();
                    blogData.likes = [];
                    blogData.dislikes = [];
                    blogData.commentCount = 0;
                    blogData.isOriginal = true;
                    
                    const docRef = await addDoc(collection(db, "community_resources"), blogData);
                    currentBlogId = docRef.id;
                    alert("Blog published successfully!");
                }
                
                window.location.href = "resources.html";
            } catch (err) {
                alert("Operation failed: " + err.message);
                publishBtn.disabled = false;
                publishBtn.classList.remove("processing", "btn-loading");
                publishBtn.querySelector("span").textContent = isEditMode ? "Update Blog" : "Publish Blog";
            }
        };
    </script>
</body>
